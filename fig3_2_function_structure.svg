<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title { font: 700 28px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .caption { font: 24px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .root { fill: #fff; stroke: #222; stroke-width: 2.6; rx: 12; ry: 12; }
      .node { fill: #fff; stroke: #222; stroke-width: 2.2; rx: 10; ry: 10; }
      .text1 { font: 700 22px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .text2 { font: 20px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .line { stroke: #222; stroke-width: 2.2; fill: none; }
    </style>
  </defs>

  <text x="700" y="50" text-anchor="middle" class="title">图3.2 系统功能结构图</text>

  <rect x="560" y="110" width="280" height="70" class="root"/>
  <text x="700" y="154" text-anchor="middle" class="text1">数码电子商城系统</text>

  <rect x="130" y="290" width="260" height="70" class="node"/>
  <text x="260" y="334" text-anchor="middle" class="text1">用户端商城模块</text>

  <rect x="570" y="290" width="260" height="70" class="node"/>
  <text x="700" y="334" text-anchor="middle" class="text1">后台管理模块</text>

  <rect x="1090" y="290" width="260" height="70" class="node"/>
  <text x="1220" y="334" text-anchor="middle" class="text1">数据库支撑模块</text>

  <line x1="700" y1="180" x2="260" y2="290" class="line"/>
  <line x1="700" y1="180" x2="700" y2="290" class="line"/>
  <line x1="700" y1="180" x2="1220" y2="290" class="line"/>

  <rect x="60" y="490" width="180" height="60" class="node"/>
  <text x="150" y="528" text-anchor="middle" class="text2">首页与商品浏览</text>
  <rect x="280" y="490" width="180" height="60" class="node"/>
  <text x="370" y="528" text-anchor="middle" class="text2">购物车与结算</text>
  <rect x="160" y="620" width="200" height="60" class="node"/>
  <text x="260" y="658" text-anchor="middle" class="text2">订单与个人中心</text>
  <rect x="160" y="740" width="200" height="60" class="node"/>
  <text x="260" y="778" text-anchor="middle" class="text2">拼团、秒杀、会员</text>

  <line x1="260" y1="360" x2="260" y2="620" class="line"/>
  <line x1="260" y1="360" x2="150" y2="490" class="line"/>
  <line x1="260" y1="360" x2="370" y2="490" class="line"/>
  <line x1="260" y1="680" x2="260" y2="740" class="line"/>

  <rect x="490" y="490" width="180" height="60" class="node"/>
  <text x="580" y="528" text-anchor="middle" class="text2">数据看板</text>
  <rect x="730" y="490" width="180" height="60" class="node"/>
  <text x="820" y="528" text-anchor="middle" class="text2">商品与轮播图管理</text>
  <rect x="490" y="620" width="180" height="60" class="node"/>
  <text x="580" y="658" text-anchor="middle" class="text2">订单与评论管理</text>
  <rect x="730" y="620" width="180" height="60" class="node"/>
  <text x="820" y="658" text-anchor="middle" class="text2">会员与优惠券管理</text>
  <rect x="610" y="750" width="180" height="60" class="node"/>
  <text x="700" y="788" text-anchor="middle" class="text2">拼团与秒杀设置</text>

  <line x1="700" y1="360" x2="580" y2="490" class="line"/>
  <line x1="700" y1="360" x2="820" y2="490" class="line"/>
  <line x1="700" y1="360" x2="580" y2="620" class="line"/>
  <line x1="700" y1="360" x2="820" y2="620" class="line"/>
  <line x1="700" y1="360" x2="700" y2="750" class="line"/>

  <rect x="1130" y="470" width="180" height="60" class="node"/>
  <text x="1220" y="508" text-anchor="middle" class="text2">用户与管理员数据</text>
  <rect x="1020" y="640" width="180" height="60" class="node"/>
  <text x="1110" y="678" text-anchor="middle" class="text2">商品与订单数据</text>
  <rect x="1220" y="640" width="180" height="60" class="node"/>
  <text x="1310" y="678" text-anchor="middle" class="text2">活动与配置数据</text>

  <line x1="1220" y1="360" x2="1220" y2="470" class="line"/>
  <line x1="1220" y1="530" x2="1110" y2="640" class="line"/>
  <line x1="1220" y1="530" x2="1310" y2="640" class="line"/>

  <text x="700" y="925" text-anchor="middle" class="caption">系统功能由用户端商城、后台管理和数据库支撑三部分组成，各模块共同完成商城业务闭环。</text>
</svg>
