<svg xmlns="http://www.w3.org/2000/svg" width="920" height="1040" viewBox="0 0 920 1040">
  <defs>
    <style>
      .t { font: 700 26px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .n { font: 22px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .box { fill: #fff; stroke: #222; stroke-width: 2.2; }
      .line { stroke: #222; stroke-width: 2.1; fill: none; }
    </style>
    <marker id="a16" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>
  <text x="460" y="48" text-anchor="middle" class="t">图4.16 管理员登录流程图</text>
  <ellipse cx="460" cy="100" rx="70" ry="28" class="box"/><text x="460" y="108" text-anchor="middle" class="n">开始</text>
  <rect x="340" y="160" width="240" height="54" class="box"/><text x="460" y="195" text-anchor="middle" class="n">输入管理员账号密码</text>
  <rect x="340" y="250" width="240" height="54" class="box"/><text x="460" y="285" text-anchor="middle" class="n">提交登录请求</text>
  <polygon points="460,360 640,410 460,460 280,410" class="box"/><text x="460" y="418" text-anchor="middle" class="n">账号和密码是否正确</text>
  <rect x="660" y="384" width="150" height="52" class="box"/><text x="735" y="418" text-anchor="middle" class="n">返回登录失败</text>
  <rect x="340" y="520" width="240" height="54" class="box"/><text x="460" y="555" text-anchor="middle" class="n">写入管理员会话</text>
  <rect x="340" y="620" width="240" height="54" class="box"/><text x="460" y="655" text-anchor="middle" class="n">加载后台菜单框架</text>
  <rect x="340" y="720" width="240" height="54" class="box"/><text x="460" y="755" text-anchor="middle" class="n">请求统计数据接口</text>
  <rect x="340" y="820" width="240" height="54" class="box"/><text x="460" y="855" text-anchor="middle" class="n">进入后台首页</text>
  <ellipse cx="460" cy="940" rx="70" ry="28" class="box"/><text x="460" y="948" text-anchor="middle" class="n">结束</text>

  <line x1="460" y1="128" x2="460" y2="160" class="line" marker-end="url(#a16)"/>
  <line x1="460" y1="214" x2="460" y2="250" class="line" marker-end="url(#a16)"/>
  <line x1="460" y1="304" x2="460" y2="360" class="line" marker-end="url(#a16)"/>
  <line x1="640" y1="410" x2="660" y2="410" class="line" marker-end="url(#a16)"/>
  <text x="618" y="396" class="n">否</text>
  <line x1="735" y1="436" x2="735" y2="940" class="line"/>
  <line x1="735" y1="940" x2="530" y2="940" class="line" marker-end="url(#a16)"/>
  <line x1="460" y1="460" x2="460" y2="520" class="line" marker-end="url(#a16)"/>
  <text x="478" y="498" class="n">是</text>
  <line x1="460" y1="574" x2="460" y2="620" class="line" marker-end="url(#a16)"/>
  <line x1="460" y1="674" x2="460" y2="720" class="line" marker-end="url(#a16)"/>
  <line x1="460" y1="774" x2="460" y2="820" class="line" marker-end="url(#a16)"/>
  <line x1="460" y1="874" x2="460" y2="912" class="line" marker-end="url(#a16)"/>
</svg>
