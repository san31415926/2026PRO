<svg xmlns="http://www.w3.org/2000/svg" width="800" height="980" viewBox="0 0 800 980">
  <defs>
    <style>
      .t { font: 700 26px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .n { font: 22px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .box { fill: #fff; stroke: #222; stroke-width: 2.2; }
      .line { stroke: #222; stroke-width: 2.1; fill: none; }
    </style>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#222"/></marker>
  </defs>
  <text x="400" y="48" text-anchor="middle" class="t">图4.1 首页加载流程图</text>
  <ellipse cx="400" cy="110" rx="70" ry="28" class="box"/><text x="400" y="118" text-anchor="middle" class="n">开始</text>
  <rect x="300" y="170" width="200" height="54" class="box"/><text x="400" y="205" text-anchor="middle" class="n">初始化页面参数</text>
  <rect x="300" y="270" width="200" height="54" class="box"/><text x="400" y="305" text-anchor="middle" class="n">请求轮播图数据</text>
  <rect x="300" y="370" width="200" height="54" class="box"/><text x="400" y="405" text-anchor="middle" class="n">请求商品列表数据</text>
  <rect x="300" y="470" width="200" height="54" class="box"/><text x="400" y="505" text-anchor="middle" class="n">执行分类与搜索筛选</text>
  <rect x="300" y="570" width="200" height="54" class="box"/><text x="400" y="605" text-anchor="middle" class="n">渲染首页商品卡片</text>
  <rect x="300" y="670" width="200" height="54" class="box"/><text x="400" y="705" text-anchor="middle" class="n">显示活动状态标签</text>
  <ellipse cx="400" cy="790" rx="70" ry="28" class="box"/><text x="400" y="798" text-anchor="middle" class="n">结束</text>
  <line x1="400" y1="138" x2="400" y2="170" class="line" marker-end="url(#a1)"/>
  <line x1="400" y1="224" x2="400" y2="270" class="line" marker-end="url(#a1)"/>
  <line x1="400" y1="324" x2="400" y2="370" class="line" marker-end="url(#a1)"/>
  <line x1="400" y1="424" x2="400" y2="470" class="line" marker-end="url(#a1)"/>
  <line x1="400" y1="524" x2="400" y2="570" class="line" marker-end="url(#a1)"/>
  <line x1="400" y1="624" x2="400" y2="670" class="line" marker-end="url(#a1)"/>
  <line x1="400" y1="724" x2="400" y2="762" class="line" marker-end="url(#a1)"/>
</svg>
