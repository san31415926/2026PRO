<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1320" viewBox="0 0 1280 1320">
  <defs>
    <style>
      .t { font: 700 28px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .n { font: 22px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .box { fill: #fff; stroke: #222; stroke-width: 2.2; }
      .line { stroke: #222; stroke-width: 2.1; fill: none; }
    </style>
    <marker id="g12" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>
  <text x="640" y="48" text-anchor="middle" class="t">图4.12 拼团业务流程图</text>

  <ellipse cx="640" cy="100" rx="72" ry="28" class="box"/>
  <text x="640" y="108" text-anchor="middle" class="n">开始</text>

  <rect x="500" y="160" width="280" height="56" class="box"/>
  <text x="640" y="196" text-anchor="middle" class="n">选择拼团商品并提交订单</text>

  <polygon points="640,280 860,335 640,390 420,335" class="box"/>
  <text x="640" y="343" text-anchor="middle" class="n">拼团操作是发起还是参团</text>

  <rect x="120" y="450" width="220" height="56" class="box"/>
  <text x="230" y="486" text-anchor="middle" class="n">生成拼团队伍和拼团码</text>

  <rect x="930" y="450" width="180" height="56" class="box"/>
  <text x="1020" y="486" text-anchor="middle" class="n">输入拼团码</text>

  <polygon points="1020,570 1200,625 1020,680 840,625" class="box"/>
  <text x="1020" y="633" text-anchor="middle" class="n">拼团码是否有效</text>

  <rect x="930" y="760" width="220" height="56" class="box"/>
  <text x="1040" y="796" text-anchor="middle" class="n">提示拼团码无效</text>

  <rect x="500" y="760" width="280" height="56" class="box"/>
  <text x="640" y="796" text-anchor="middle" class="n">创建或更新拼团订单</text>

  <rect x="500" y="860" width="280" height="56" class="box"/>
  <text x="640" y="896" text-anchor="middle" class="n">更新拼团队伍当前人数</text>

  <polygon points="640,980 860,1035 640,1090 420,1035" class="box"/>
  <text x="640" y="1043" text-anchor="middle" class="n">当前人数是否达到成团要求</text>

  <rect x="150" y="1130" width="240" height="56" class="box"/>
  <text x="270" y="1166" text-anchor="middle" class="n">订单保持拼团中状态</text>

  <rect x="860" y="1130" width="280" height="56" class="box"/>
  <text x="1000" y="1166" text-anchor="middle" class="n">队伍成团并同步订单状态</text>

  <ellipse cx="640" cy="1260" rx="72" ry="28" class="box"/>
  <text x="640" y="1268" text-anchor="middle" class="n">结束</text>

  <line x1="640" y1="128" x2="640" y2="160" class="line" marker-end="url(#g12)"/>
  <line x1="640" y1="216" x2="640" y2="280" class="line" marker-end="url(#g12)"/>

  <line x1="420" y1="335" x2="230" y2="450" class="line" marker-end="url(#g12)"/>
  <text x="360" y="362" class="n">发起拼团</text>
  <path d="M230 506 L230 788 L500 788" class="line" marker-end="url(#g12)"/>

  <line x1="860" y1="335" x2="1020" y2="450" class="line" marker-end="url(#g12)"/>
  <text x="880" y="362" class="n">参与拼团</text>
  <line x1="1020" y1="506" x2="1020" y2="570" class="line" marker-end="url(#g12)"/>

  <line x1="1040" y1="680" x2="1040" y2="760" class="line" marker-end="url(#g12)"/>
  <text x="1052" y="722" class="n">否</text>
  <path d="M1150 788 L1230 788 L1230 478 L1110 478" class="line" marker-end="url(#g12)"/>

  <path d="M840 625 L640 625 L640 760" class="line" marker-end="url(#g12)"/>
  <text x="760" y="612" class="n">是</text>

  <line x1="640" y1="816" x2="640" y2="860" class="line" marker-end="url(#g12)"/>
  <line x1="640" y1="916" x2="640" y2="980" class="line" marker-end="url(#g12)"/>

  <line x1="420" y1="1035" x2="270" y2="1130" class="line" marker-end="url(#g12)"/>
  <text x="396" y="1068" class="n">否</text>
  <path d="M270 1186 L270 1260 L568 1260" class="line" marker-end="url(#g12)"/>

  <line x1="860" y1="1035" x2="1000" y2="1130" class="line" marker-end="url(#g12)"/>
  <text x="878" y="1068" class="n">是</text>
  <path d="M1000 1186 L1000 1260 L712 1260" class="line" marker-end="url(#g12)"/>
</svg>
