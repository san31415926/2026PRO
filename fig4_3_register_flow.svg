<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1260" viewBox="0 0 1240 1260">
  <defs>
    <style>
      .t { font: 700 28px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .n { font: 22px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .box { fill: #fff; stroke: #222; stroke-width: 2.2; }
      .line { stroke: #222; stroke-width: 2.1; fill: none; }
    </style>
    <marker id="r3" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
  </defs>
  <text x="620" y="48" text-anchor="middle" class="t">图4.3 用户注册流程图</text>

  <ellipse cx="620" cy="100" rx="72" ry="28" class="box"/>
  <text x="620" y="108" text-anchor="middle" class="n">开始</text>

  <rect x="490" y="160" width="260" height="56" class="box"/>
  <text x="620" y="196" text-anchor="middle" class="n">输入用户名和密码</text>

  <rect x="490" y="250" width="260" height="56" class="box"/>
  <text x="620" y="286" text-anchor="middle" class="n">提交注册请求</text>

  <polygon points="620,360 840,415 620,470 400,415" class="box"/>
  <text x="620" y="423" text-anchor="middle" class="n">账号是否已存在</text>

  <rect x="950" y="388" width="180" height="54" class="box"/>
  <text x="1040" y="423" text-anchor="middle" class="n">提示账号已存在</text>

  <rect x="490" y="520" width="260" height="56" class="box"/>
  <text x="620" y="556" text-anchor="middle" class="n">创建用户并初始化数据</text>

  <polygon points="620,630 870,685 620,740 370,685" class="box"/>
  <text x="620" y="693" text-anchor="middle" class="n">是否存在新人优惠券模板</text>

  <rect x="70" y="658" width="220" height="54" class="box"/>
  <text x="180" y="693" text-anchor="middle" class="n">创建新人优惠券模板</text>

  <polygon points="620,810 840,865 620,920 400,865" class="box"/>
  <text x="620" y="873" text-anchor="middle" class="n">新人券库存是否大于零</text>

  <rect x="940" y="838" width="180" height="54" class="box"/>
  <text x="1030" y="873" text-anchor="middle" class="n">向用户发放新人券</text>

  <rect x="490" y="990" width="260" height="56" class="box"/>
  <text x="620" y="1026" text-anchor="middle" class="n">返回注册成功</text>

  <ellipse cx="620" cy="1140" rx="72" ry="28" class="box"/>
  <text x="620" y="1148" text-anchor="middle" class="n">结束</text>

  <line x1="620" y1="128" x2="620" y2="160" class="line" marker-end="url(#r3)"/>
  <line x1="620" y1="216" x2="620" y2="250" class="line" marker-end="url(#r3)"/>
  <line x1="620" y1="306" x2="620" y2="360" class="line" marker-end="url(#r3)"/>

  <line x1="840" y1="415" x2="950" y2="415" class="line" marker-end="url(#r3)"/>
  <text x="878" y="402" class="n">是</text>
  <path d="M1040 388 L1040 188 L750 188" class="line" marker-end="url(#r3)"/>

  <line x1="620" y1="470" x2="620" y2="520" class="line" marker-end="url(#r3)"/>
  <text x="640" y="502" class="n">否</text>
  <line x1="620" y1="576" x2="620" y2="630" class="line" marker-end="url(#r3)"/>

  <line x1="370" y1="685" x2="302" y2="685" class="line" marker-end="url(#r3)"/>
  <text x="305" y="662" class="n">否</text>
  <path d="M180 712 L180 865 L400 865" class="line" marker-end="url(#r3)"/>

  <line x1="620" y1="740" x2="620" y2="810" class="line" marker-end="url(#r3)"/>
  <text x="640" y="776" class="n">是</text>

  <line x1="840" y1="865" x2="940" y2="865" class="line" marker-end="url(#r3)"/>
  <text x="878" y="852" class="n">是</text>
  <path d="M1030 892 L1030 1018 L750 1018" class="line" marker-end="url(#r3)"/>

  <line x1="620" y1="920" x2="620" y2="990" class="line" marker-end="url(#r3)"/>
  <text x="640" y="956" class="n">否</text>

  <line x1="620" y1="1046" x2="620" y2="1112" class="line" marker-end="url(#r3)"/>
</svg>
