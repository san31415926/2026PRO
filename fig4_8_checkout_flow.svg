<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1120" viewBox="0 0 900 1120">
  <defs>
    <style>
      .t { font: 700 26px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .n { font: 22px 'Microsoft YaHei', SimSun, serif; fill: #111; }
      .box { fill: #fff; stroke: #222; stroke-width: 2.2; }
      .line { stroke: #222; stroke-width: 2.1; fill: none; }
    </style>
    <marker id="a4" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#222"/></marker>
  </defs>
  <text x="450" y="48" text-anchor="middle" class="t">图4.8 购物车结算流程图</text>
  <ellipse cx="450" cy="100" rx="70" ry="28" class="box"/><text x="450" y="108" text-anchor="middle" class="n">开始</text>
  <rect x="340" y="160" width="220" height="54" class="box"/><text x="450" y="195" text-anchor="middle" class="n">勾选待结算商品</text>
  <rect x="340" y="250" width="220" height="54" class="box"/><text x="450" y="285" text-anchor="middle" class="n">选择收货地址</text>
  <polygon points="450,350 620,400 450,450 280,400" class="box"/><text x="450" y="408" text-anchor="middle" class="n">是否包含秒杀商品</text>
  <rect x="620" y="374" width="170" height="52" class="box"/><text x="705" y="408" text-anchor="middle" class="n">跳过优惠抵扣</text>
  <rect x="340" y="510" width="220" height="54" class="box"/><text x="450" y="545" text-anchor="middle" class="n">选择优惠券和积分</text>
  <rect x="340" y="610" width="220" height="54" class="box"/><text x="450" y="645" text-anchor="middle" class="n">计算订单金额</text>
  <polygon points="450,710 620,760 450,810 280,760" class="box"/><text x="450" y="768" text-anchor="middle" class="n">库存和余额是否充足</text>
  <rect x="620" y="734" width="180" height="52" class="box"/><text x="710" y="768" text-anchor="middle" class="n">返回失败提示</text>
  <rect x="340" y="870" width="220" height="54" class="box"/><text x="450" y="905" text-anchor="middle" class="n">生成订单并扣库存</text>
  <rect x="340" y="960" width="220" height="54" class="box"/><text x="450" y="995" text-anchor="middle" class="n">进入支付成功页</text>
  <ellipse cx="450" cy="1060" rx="70" ry="28" class="box"/><text x="450" y="1068" text-anchor="middle" class="n">结束</text>
  <line x1="450" y1="128" x2="450" y2="160" class="line" marker-end="url(#a4)"/>
  <line x1="450" y1="214" x2="450" y2="250" class="line" marker-end="url(#a4)"/>
  <line x1="450" y1="304" x2="450" y2="350" class="line" marker-end="url(#a4)"/>
  <line x1="705" y1="426" x2="705" y2="637" class="line"/>
  <line x1="705" y1="637" x2="560" y2="637" class="line" marker-end="url(#a4)"/>
  <text x="592" y="388" class="n">是</text>
  <line x1="450" y1="450" x2="450" y2="510" class="line" marker-end="url(#a4)"/>
  <text x="468" y="488" class="n">否</text>
  <line x1="450" y1="564" x2="450" y2="610" class="line" marker-end="url(#a4)"/>
  <line x1="450" y1="664" x2="450" y2="710" class="line" marker-end="url(#a4)"/>
  <line x1="710" y1="786" x2="710" y2="1060" class="line"/>
  <line x1="710" y1="1060" x2="520" y2="1060" class="line" marker-end="url(#a4)"/>
  <text x="592" y="748" class="n">否</text>
  <line x1="450" y1="810" x2="450" y2="870" class="line" marker-end="url(#a4)"/>
  <text x="468" y="848" class="n">是</text>
  <line x1="450" y1="924" x2="450" y2="960" class="line" marker-end="url(#a4)"/>
  <line x1="450" y1="1014" x2="450" y2="1032" class="line" marker-end="url(#a4)"/>
</svg>
